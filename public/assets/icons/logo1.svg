  <circle cx="145" cy="125" r="32" fill="white" fill-opacity="0.2" stroke="white" stroke-width="0.5"/> <circle cx="145" cy="125" r="32" stroke="url(#nexaSoftSaaS)" stroke-width="1" stroke-opacity="0.1"/> <circle cx="145" cy="110" r="6" fill="#F472B6" fill-opacity="0.6"/> <circle cx="130" cy="125" r="6" fill="#6366F1" fill-opacity="0.6"/> <path 
    d="M190 125 L210 105 M210 105 H195 M210 105 V120" 
